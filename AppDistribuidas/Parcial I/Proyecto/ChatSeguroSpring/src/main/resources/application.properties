spring.config.import=optional:dotenv:./.env

server.port=8080
spring.servlet.multipart.max-file-size=${CHAT_UPLOAD_MAX_SIZE:10MB}
spring.servlet.multipart.max-request-size=${CHAT_UPLOAD_MAX_SIZE:10MB}
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

chat.admin.username=${CHAT_ADMIN_USERNAME}
chat.admin.password=${CHAT_ADMIN_PASSWORD}
chat.room.pin-length=${CHAT_ROOM_PIN_LENGTH}
chat.upload.allowed-types=${CHAT_UPLOAD_ALLOWED_TYPES}
chat.upload.max-size=${CHAT_UPLOAD_MAX_SIZE:10485760}
