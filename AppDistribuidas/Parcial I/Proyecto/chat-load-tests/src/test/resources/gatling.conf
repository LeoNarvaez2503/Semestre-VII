gatling {
  core {
    #outputDirectoryBaseName = "results" # The prefix for reports generated
    outputDirectoryBaseName = "chat-load-test-results"
    #runDescription = "" # The description for this run, displayed in the reports
  }
  charting {
    #noReports = false           # When set to true, disables the Gatling charts
    #maxPlotSize = 8000          # The number of points per series per graph, if the number of points to display is superior to the max, the main asked values will be down sampled, otherwise up sampled.
    #accuracy = 0.005            # The size of the request/response errors to ignore from the statistics into the reports
    indicators {
      #lowerBound = 800          # The lower bound for the requests/sec threshold to rate the run
      #higherBound = 1200         # The higher bound for the requests/sec threshold to rate the run
      #percentile1 = 95           # First percentile to display in the statistics table
      #percentile2 = 99           # Second percentile to display in the statistics table
      #percentile3 = 99.9         # Third percentile to display in the statistics table
      #percentile4 = 99.99        # Fourth percentile to display in the statistics table
    }
  }
  http {
    #verbose = false            # Very verbose HTTP logging
    #ahc {
      #maxConnectionsPerHost = 4
      #maxConnections = 20
    #}
  }
}
